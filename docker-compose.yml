version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-10}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - AI_RETRY_DELAY_MS=${AI_RETRY_DELAY_MS:-1000}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
